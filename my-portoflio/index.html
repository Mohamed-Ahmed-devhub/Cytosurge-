<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="premium-nav">
    <div class="nav-wrapper">
        <div class="logo">CED<span>.</span></div>
        <div class="nav-links">
            <a href="#" class="link-item">Projects</a>
            <a href="#" class="link-item">Expertise</a>
            <a href="#" class="contact-pill">Start a Project</a>
        </div>
    </div>
</nav>

<section class="hero-master">
    <div class="noise"></div>
    <div class="hero-container">
        <div class="content-box">
            <h4 class="hero-overline">Based in Egypt</h4>
            <h1 class="hero-heading">
                Crafting <br> 
                <span class="glitch-text">Interfaces</span>
            </h1>
            <p class="hero-sub">Specialized in building high-end interactive websites with focus on motion and luxury aesthetics.</p>
            <div class="hero-cta">
                <button class="btn-main">View Projects</button>
                <button class="btn-secondary">My Tech Stack</button>
            </div>
        </div>

        <div class="visual-box">
            <div class="image-wrapper">
                <div class="shape-blob">
                    <img src="./photo_o.jpg" alt="Profile">
                </div>
                <div class="float-node n1">React.JS</div>
                <div class="float-node n2">Three.JS</div>
                <div class="float-node n3">UI Motion</div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
